name: Ghost-Mesh Production Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60 # لمنع استهلاك الوقت في حال حدوث تعليق
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sovereign Mirror Injection
        run: |
          # تحويل المستودعات إلى مرايا Kernel.org العالمية لتجاوز بطء Azure
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu/|http://mirrors.kernel.org/ubuntu/|g' /etc/apt/sources.list
          sudo sed -i 's|http://archive.ubuntu.com/ubuntu/|http://mirrors.kernel.org/ubuntu/|g' /etc/apt/sources.list
          sudo apt-get clean
          sudo apt-get update -y

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rapid Arsenal Installation
        run: |
          # تثبيت الحزم بأقل قدر من التفاعل والاعتماديات الفرعية
          sudo apt-get install -y --no-install-recommends \
            build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev libsqlite3-dev \
            sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev \
            libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev \
            libffi-dev uuid-dev lzma lzma-dev tk-dev zip unzip pkg-config \
            libtinfo5 rustc cargo

      - name: Install Python Tools
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 buildozer packaging tomli jinja2 MarkupSafe toml build appdirs colorama sh six

      - name: Execute Buildozer Engine
        run: |
          # تنفيذ البناء مع فرض الموافقة التلقائية
          yes | buildozer -v android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostMesh-APK
          path: bin/*.apk
