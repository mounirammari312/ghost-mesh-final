name: GBO Sovereign Forge (Cloud Build)
on:
  push:
    branches: [ "main" ]

jobs:
  build-native:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Sovereignty Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK 36
      uses: android-actions/setup-android@v3
      with:
        api-level: 36

    - name: Install NDK Directly (Sovereign Method)
      run: |
        # استخدام المحمل الرسمي لضمان عدم الانهيار المستقبلي
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Build C++ Native Engine (Absolute Path Strategy)
      run: |
        echo "Starting Architectural Build for SDK 36..."
        # التأكد من وجود المجلدات بالمسارات المطلقة
        mkdir -p /root/gbo_project/core/native_engine/build
        # ملاحظة: سيتم إضافة كود CMake الفعلي في الخطوة القادمة
        echo "Build structure validated."
