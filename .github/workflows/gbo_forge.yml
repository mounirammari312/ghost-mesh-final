name: GBO Sovereign Forge (Cloud Build)
on:
  push:
    branches: [ "main" ]

jobs:
  build-native:
    runs-on: ubuntu-latest
    # تعريف المسار المطلق كمتغير بيئي لضمان التوحيد
    env:
      GBO_ABS_PATH: /home/runner/work/gbo-sovereign-engine/gbo-sovereign-engine
    
    steps:
    - name: Checkout Sovereignty Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK 36
      uses: android-actions/setup-android@v3
      with:
        api-level: 36

    - name: Install NDK Directly (Sovereign Method)
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Build C++ Native Engine (Standardized Absolute Path)
      run: |
        echo "Starting Architectural Build for SDK 36..."
        # استخدام المسار النسبي للمجلد الحالي كمسار مطلق للعملية
        mkdir -p core/native_engine/build
        cd core/native_engine/build
        echo "Build directory created at: $(pwd)"
        # التحقق من وجود ملفات المشروع
        ls -R $GITHUB_WORKSPACE
